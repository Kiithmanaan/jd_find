# 文档性质：现状事实源（API 契约）——请求校验以 src/api/schemas.ts 为代码事实源，本文件为对外发布契约，受 npm run contracts:check 校验。
openapi: 3.0.3
info:
  title: JD Search API
  version: 0.1.0
  description: 第一阶段 API 规格，覆盖认证、硬性条件配置、SearchRun、插件候选人提交和 AI 审计。
servers:
  - url: http://127.0.0.1:3000/api
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: 健康检查
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /auth/login:
    post:
      summary: Web 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /plugin/auth/login:
    post:
      summary: 插件登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /hard-condition-config:
    get:
      summary: 获取硬性条件配置
      security: []
      responses:
        "200":
          description: 硬性条件维度和选项
          content:
            application/json:
              schema:
                type: object
                required: [dimensions]
                properties:
                  dimensions:
                    type: array
                    items:
                      $ref: "#/components/schemas/HardConditionDimension"
  /search-runs/one-time:
    post:
      summary: 启动一次性寻访
      description: Mock/CSV 来源入队；插件来源创建 Running 状态 SearchRun。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/MockOneTimeSearchRequest"
                - $ref: "#/components/schemas/CsvOneTimeSearchRequest"
                - $ref: "#/components/schemas/PluginOneTimeSearchRequest"
      responses:
        "202":
          description: 已接受
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/QueuedSearchRunResponse"
                  - $ref: "#/components/schemas/PluginSearchRunResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "422":
          $ref: "#/components/responses/DomainError"
  /search-runs/{id}:
    get:
      summary: 查询 SearchRun
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: SearchRun
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchRun"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /search-runs/{id}/cancel:
    post:
      summary: 取消 SearchRun
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: 已取消
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchRun"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          $ref: "#/components/responses/DomainError"
  /search-runs/{id}/candidates/{candidateId}/resume-attachment:
    get:
      summary: 下载候选人简历附件
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
        - $ref: "#/components/parameters/CandidateId"
      responses:
        "200":
          description: 简历附件二进制内容
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: SearchRun、候选人或附件不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search-runs/{id}/ai-assessment-audits:
    get:
      summary: 查询 SearchRun 的 AI 审计
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: AI 审计记录
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, records]
                properties:
                  searchRunId:
                    type: string
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIAssessmentAudit"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /search-runs/{id}/refinement-suggestions:
    post:
      summary: 触发搜索词迭代分析（推荐组 vs 淘汰组），产出下一轮搜索条件建议
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "201":
          description: 生成的搜索条件建议
          content:
            application/json:
              schema:
                type: object
                required: [suggestion]
                properties:
                  suggestion:
                    $ref: "#/components/schemas/SearchRefinementSuggestion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          description: 同一 SearchRun 的分析正在运行
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: SearchRun 未完成或无已评估候选人（RefinementNotReady）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: 查询 SearchRun 的搜索条件建议历史（按创建时间降序）
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: 建议列表
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, suggestions]
                properties:
                  searchRunId:
                    type: string
                  suggestions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SearchRefinementSuggestion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /search-runs/{id}/report:
    get:
      summary: 查询单次 SearchRun 的寻访报告（当轮快照口径，重评估不回写）
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: 寻访报告：漏斗数字、Top 候选人、待定清单
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, jobProfileId, jobProfileVersionId, status, funnel, topCandidates, pendingCandidates]
                properties:
                  searchRunId:
                    type: string
                  jobProfileId:
                    type: string
                  jobProfileVersionId:
                    type: string
                  status:
                    type: string
                  funnel:
                    $ref: "#/components/schemas/FunnelCounts"
                  topCandidates:
                    type: array
                    description: 推荐候选人按匹配分降序前 5，不足时补高分待定候选人。
                    items:
                      $ref: "#/components/schemas/CandidateResult"
                  pendingCandidates:
                    type: array
                    description: 全部推荐结论为待定的候选人，按匹配分降序。
                    items:
                      $ref: "#/components/schemas/CandidateResult"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /job-profiles/{id}/report:
    get:
      summary: 查询 JobProfile 级汇总报告（跨 SearchRun 累计漏斗 + 去重后最新评估分布）
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 汇总报告。累计漏斗为各 run 当轮快照相加；推荐结论分布为跨 run 按 fingerprint 去重后叠加最新评估（含重评估覆盖），两者口径不同。
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, currentVersionId, totalSearchRuns, cumulativeFunnel, uniqueCandidateCount, currentRecommendationDistribution, runs]
                properties:
                  jobProfileId:
                    type: string
                  currentVersionId:
                    type: string
                  totalSearchRuns:
                    type: integer
                  cumulativeFunnel:
                    $ref: "#/components/schemas/FunnelCounts"
                  uniqueCandidateCount:
                    type: integer
                  currentRecommendationDistribution:
                    type: object
                    required: [recommended, pending, notRecommended, unassessed]
                    properties:
                      recommended:
                        type: integer
                      pending:
                        type: integer
                      notRecommended:
                        type: integer
                      unassessed:
                        type: integer
                  runs:
                    type: array
                    items:
                      type: object
                      required: [searchRunId, status, createdAt, funnel]
                      properties:
                        searchRunId:
                          type: string
                        status:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        funnel:
                          $ref: "#/components/schemas/FunnelCounts"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
        "422":
          $ref: "#/components/responses/DomainError"
  /job-profiles/{id}/clarification-interviews:
    post:
      summary: 发起澄清访谈（逼问式画像梳理），返回会话与第一个问题
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "201":
          description: 已创建的访谈会话（含 currentQuestion）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClarificationInterviewSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
    get:
      summary: 列出画像下的澄清访谈会话（按创建时间降序）
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 会话列表
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, sessions]
                properties:
                  jobProfileId:
                    type: string
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClarificationInterviewSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
  /clarification-interviews/{id}:
    get:
      summary: 查询澄清访谈会话
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClarificationInterviewSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: 会话不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clarification-interviews/{id}/answers:
    post:
      summary: 回答当前访谈问题；还有话题则返回下一问，否则完成并产出画像草稿
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answer]
              properties:
                answer:
                  type: string
      responses:
        "200":
          description: 更新后的会话（进行中含 currentQuestion，完成后含 draftOutput）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClarificationInterviewSession"
        "400":
          description: 请求校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: 会话不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/DomainError"
  /job-profiles/{id}/versions:
    get:
      summary: 查询 JobProfile 版本历史
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 版本历史
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, versions]
                properties:
                  jobProfileId:
                    type: string
                  currentVersionId:
                    type: string
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobProfileVersion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
  /job-profiles/{id}/versions/draft:
    post:
      summary: 创建 JobProfile 草稿版本
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobProfileVersionDraftRequest"
      responses:
        "201":
          description: 草稿版本
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobProfileVersion"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
  /job-profiles/{id}/versions/{versionId}/confirm:
    post:
      summary: 确认 JobProfile 版本
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 已确认
          content:
            application/json:
              schema:
                type: object
                required: [jobProfile, version]
                properties:
                  jobProfile:
                    $ref: "#/components/schemas/JobProfile"
                  version:
                    $ref: "#/components/schemas/JobProfileVersion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: JobProfile 或 JobProfileVersion 不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /job-profiles/{id}/candidates:
    get:
      summary: 查询同一 JobProfile 跨 SearchRun 去重后的候选人汇总
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 候选人汇总
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, jobProfileVersionId, currentVersionCandidates, staleVersionCandidates]
                properties:
                  jobProfileId:
                    type: string
                  jobProfileVersionId:
                    type: string
                  currentVersionCandidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/CandidateResult"
                  staleVersionCandidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/CandidateResult"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
        "422":
          $ref: "#/components/responses/DomainError"
  /job-profiles/{id}/reassess-candidates:
    post:
      summary: 手动批量重新评估同一 JobProfile 的历史候选人
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "202":
          description: 已触发并完成重新评估
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, jobProfileVersionId, reassessedCount, hardRejectedCount, affectedSearchRunIds]
                properties:
                  jobProfileId:
                    type: string
                  jobProfileVersionId:
                    type: string
                  reassessedCount:
                    type: integer
                  hardRejectedCount:
                    type: integer
                  affectedSearchRunIds:
                    type: array
                    items:
                      type: string
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
        "422":
          $ref: "#/components/responses/DomainError"
  /plugin/search-runs/{id}/candidates:
    post:
      summary: 插件提交候选人
      description: 快速返回已接收；后台按 30 秒窗口聚合，单 SearchRun 缓冲满 20 条立即触发评估。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginCandidateSubmission"
      responses:
        "202":
          description: 已接受
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, status, rawSubmittedCount, acceptedCount, candidateCount]
                properties:
                  searchRunId:
                    type: string
                  status:
                    $ref: "#/components/schemas/SearchRunStatus"
                  rawSubmittedCount:
                    type: integer
                  acceptedCount:
                    type: integer
                  candidateCount:
                    type: integer
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          description: SearchRun 已完成、取消或失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /plugin/search-runs/{id}/raw-candidates:
    post:
      summary: 插件提交来源平台原始响应（服务端解析）
      description: >-
        插件上传来源平台原始响应，字段映射与解析在服务端完成（docs/30 §4b）。
        与 /candidates 并存，二者不得对同一批次同时提交。
        原始载荷按原样完整留存，不做字段过滤与个人信息最小化。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RawPluginSubmission"
      responses:
        "202":
          description: 已接受（draftsParsed 为 0 时同样返回 202，但该批次不计入 rawSubmittedCount）
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, status, rawSubmittedCount, acceptedCount, candidateCount, parse]
                properties:
                  searchRunId:
                    type: string
                  status:
                    $ref: "#/components/schemas/SearchRunStatus"
                  rawSubmittedCount:
                    type: integer
                  acceptedCount:
                    type: integer
                  candidateCount:
                    type: integer
                  parse:
                    $ref: "#/components/schemas/RawParseSummary"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          description: SearchRun 已完成、取消或失败；或同 batchId 提交了不同请求体
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: 请求体超过 8MB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: 超过限流（默认 30 次/60 秒，独立于 /candidates 的桶）
          headers:
            Retry-After:
              schema:
                type: integer
              description: 建议等待秒数
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /plugin/search-runs/{id}/parse-diagnostics:
    get:
      summary: 读取服务端解析诊断
      description: >-
        返回该 SearchRun 下各批次的解析统计与 keyCensus（原始响应中各字段名出现次数）。
        来源平台改字段名时，旧字段名计数归零、未识别新字段名满额出现，可直接定位需修改的映射字段。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: 解析诊断列表
          content:
            application/json:
              schema:
                type: object
                required: [diagnostics]
                properties:
                  diagnostics:
                    type: array
                    items:
                      $ref: "#/components/schemas/RawParseDiagnostic"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /plugin/search-runs/{id}/status:
    get:
      summary: 插件轮询 SearchRun 状态
      description: 插件专用状态端点（plugin token）。只返回状态与计数，不暴露候选人明细。区别于 Web 版 GET /search-runs/{id}。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: 状态与计数
          content:
            application/json:
              schema:
                type: object
                required: [id, status, rawSubmittedCount, targetResultCount]
                properties:
                  id:
                    type: string
                  status:
                    $ref: "#/components/schemas/SearchRunStatus"
                  rawSubmittedCount:
                    type: integer
                  targetResultCount:
                    type: integer
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /plugin/search-runs/{id}/candidates/{candidateId}/resume-attachment:
    post:
      summary: 插件上传候选人简历附件
      description: 第一阶段使用 JSON base64 传输；本地存储按 SearchRun 分目录；重复上传覆盖候选人当前附件。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeAttachmentUpload"
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, candidateId, filename, contentType, sizeBytes, downloadUrl]
                properties:
                  searchRunId:
                    type: string
                  candidateId:
                    type: string
                  filename:
                    type: string
                  contentType:
                    type: string
                  sizeBytes:
                    type: integer
                  downloadUrl:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: SearchRun 或 Candidate 不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          $ref: "#/components/responses/DomainError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SearchRunId:
      name: id
      in: path
      required: true
      schema:
        type: string
    JobProfileId:
      name: id
      in: path
      required: true
      schema:
        type: string
    CandidateId:
      name: candidateId
      in: path
      required: true
      schema:
        type: string
  responses:
    ValidationError:
      description: 请求校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AuthError:
      description: 认证失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DomainError:
      description: 领域规则错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SearchRunNotFound:
      description: SearchRun 不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    JobProfileNotFound:
      description: JobProfile 不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [token, tokenType, expiresIn]
      properties:
        token:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        issues:
          type: array
          items:
            type: object
            required: [path, message]
            properties:
              path:
                type: string
              message:
                type: string
    SearchRefinementSuggestion:
      type: object
      description: 搜索词迭代分析产出的搜索条件建议，绑定生成时的画像版本。
      required: [id, searchRunId, jobProfileId, jobProfileVersionId, suggestedSearchCondition, addedKeywords, droppedKeywords, reasoning, analysisSnapshot, provider, model, promptVersion, agentVersion, createdAt]
      properties:
        id:
          type: string
        searchRunId:
          type: string
        jobProfileId:
          type: string
        jobProfileVersionId:
          type: string
        suggestedSearchCondition:
          type: object
        addedKeywords:
          type: array
          items:
            type: string
        droppedKeywords:
          type: array
          items:
            type: string
        reasoning:
          type: string
        analysisSnapshot:
          type: object
          required: [recommendedCount, eliminatedCount, recommendedTraits, eliminatedTraits]
          properties:
            recommendedCount:
              type: integer
            eliminatedCount:
              type: integer
            recommendedTraits:
              type: array
              items:
                type: string
            eliminatedTraits:
              type: array
              items:
                type: string
        provider:
          type: string
        model:
          type: string
        promptVersion:
          type: string
        agentVersion:
          type: string
        createdAt:
          type: string
          format: date-time
    ClarificationInterviewSession:
      type: object
      description: 澄清访谈会话。turns 内嵌每轮 AI 调用元数据即审计；进行中含 currentQuestion，完成后含 draftOutput。
      required: [id, jobProfileId, status, currentTopicIndex, turns, provider, model, promptVersion, createdAt, updatedAt]
      properties:
        id:
          type: string
        jobProfileId:
          type: string
        createdByUserId:
          type: string
        status:
          type: string
          enum: [InProgress, Completed, Abandoned]
        currentTopicIndex:
          type: integer
        turns:
          type: array
          items:
            type: object
            required: [topicKey, question, suggestedAnswer, askedAt, ai]
            properties:
              topicKey:
                type: string
                enum: [role-purpose, hard-gates, vital-skills, negative-signals, target-companies, search-keywords, soft-preferences]
              question:
                type: string
              suggestedAnswer:
                type: string
              answer:
                type: string
              askedAt:
                type: string
                format: date-time
              answeredAt:
                type: string
                format: date-time
              ai:
                type: object
                required: [provider, model, promptVersion, agentVersion, durationMs]
                properties:
                  provider:
                    type: string
                  model:
                    type: string
                  promptVersion:
                    type: string
                  agentVersion:
                    type: string
                  graphVersion:
                    type: string
                  durationMs:
                    type: integer
        currentQuestion:
          type: object
          required: [topicKey, question, suggestedAnswer]
          properties:
            topicKey:
              type: string
            question:
              type: string
            suggestedAnswer:
              type: string
        draftOutput:
          type: object
          required: [jdText, hardRequirementNotes, softRequirements, negativeSignals, searchKeywords]
          properties:
            jdText:
              type: string
            hardRequirementNotes:
              type: array
              items:
                type: string
            softRequirements:
              type: array
              items:
                type: object
            negativeSignals:
              type: array
              items:
                type: string
            searchKeywords:
              type: array
              items:
                type: string
        provider:
          type: string
        model:
          type: string
        promptVersion:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    FunnelCounts:
      type: object
      description: 寻访漏斗计数：原始提交→去重→硬筛→评估→推荐结论分布。
      required: [rawSubmitted, deduplicated, hardPassed, hardRejected, assessed, recommended, pending, notRecommended]
      properties:
        rawSubmitted:
          type: integer
        deduplicated:
          type: integer
        hardPassed:
          type: integer
        hardRejected:
          type: integer
        assessed:
          type: integer
        recommended:
          type: integer
        pending:
          type: integer
        notRecommended:
          type: integer
    JobProfile:
      type: object
      required: [id, title, jdText, status, searchCondition, hardRequirements, softRequirements]
      properties:
        id:
          type: string
        createdByUserId:
          type: string
        title:
          type: string
        jdText:
          type: string
        status:
          type: string
          enum: [Draft, Suggested, Confirmed, Archived]
        currentVersionId:
          type: string
        searchCondition:
          type: object
        hardRequirements:
          type: array
          items:
            type: object
        softRequirements:
          type: array
          items:
            type: object
        negativeSignals:
          type: array
          description: 排除信号：命中即提示风险的简历特征描述，供匹配评估风险点逐条对照。
          items:
            type: string
        confirmedAt:
          type: string
          format: date-time
    JobProfileVersion:
      type: object
      required: [id, jobProfileId, version, title, jdText, searchCondition, hardRequirements, softRequirements, status, createdAt]
      properties:
        id:
          type: string
        jobProfileId:
          type: string
        version:
          type: integer
        title:
          type: string
        jdText:
          type: string
        searchCondition:
          type: object
        hardRequirements:
          type: array
          items:
            type: object
        softRequirements:
          type: array
          items:
            type: object
        negativeSignals:
          type: array
          description: 排除信号：命中即提示风险的简历特征描述。
          items:
            type: string
        status:
          type: string
          enum: [Draft, Confirmed]
        createdAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
    JobProfileVersionDraftRequest:
      type: object
      required: [title, jdText, searchCondition, hardRequirements, softRequirements]
      properties:
        title:
          type: string
        jdText:
          type: string
        searchCondition:
          type: object
        hardRequirements:
          type: array
          items:
            type: object
        softRequirements:
          type: array
          items:
            type: object
        negativeSignals:
          type: array
          description: 排除信号，可省略，默认空数组。
          items:
            type: string
    CandidateDraft:
      type: object
      required: [fingerprint, resume, intent, activityLevel, sourceLead]
      properties:
        fingerprint:
          type: string
        resume:
          $ref: "#/components/schemas/CandidateResume"
        intent:
          type: string
        activityLevel:
          type: string
        sourceLead:
          $ref: "#/components/schemas/SourceLead"
    CandidateResult:
      type: object
      required: [id, fingerprint, jobProfileId, searchRunId, status, resume, intent, activityLevel, sourceLead, hardRejectReasons]
      properties:
        id:
          type: string
        fingerprint:
          type: string
        jobProfileId:
          type: string
        searchRunId:
          type: string
        status:
          type: string
          enum: [Pending, Acquired, Deduplicated, HardPassed, HardRejected, Assessed, Displayable]
        resume:
          $ref: "#/components/schemas/CandidateResume"
        intent:
          type: string
        activityLevel:
          type: string
        sourceLead:
          $ref: "#/components/schemas/SourceLead"
        hardRejectReasons:
          type: array
          items:
            type: string
        matchAssessment:
          $ref: "#/components/schemas/MatchAssessment"
        resumeAttachment:
          $ref: "#/components/schemas/PublicResumeAttachment"
    CandidateResume:
      type: object
      required: [name, title, city, educationLevel, yearsOfExperience, industries, keywords, summary]
      properties:
        name:
          type: string
        title:
          type: string
        city:
          type: string
        educationLevel:
          type: string
        yearsOfExperience:
          type: integer
        industries:
          type: array
          items:
            type: string
        keywords:
          type: array
          items:
            type: string
        summary:
          type: string
    SourceLead:
      type: object
      required: [platform, searchContext, fallbackClues]
      properties:
        platform:
          type: string
        url:
          type: string
          format: uri
        searchContext:
          type: string
        fallbackClues:
          type: array
          items:
            type: string
        expired:
          type: boolean
        normalizedUrl:
          type: string
        externalId:
          type: string
        verificationStatus:
          type: string
          enum: [unverified, active, expired, fallback_only]
        lastVerifiedAt:
          type: string
          format: date-time
        riskLevel:
          type: string
          enum: [low, medium, high]
    MockOneTimeSearchRequest:
      type: object
      required: [jobProfile, sourceType, candidates]
      properties:
        jobProfile:
          $ref: "#/components/schemas/JobProfile"
        sourceType:
          type: string
          enum: [mock]
        targetResultCount:
          type: integer
          minimum: 10
          maximum: 500
          default: 200
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateDraft"
        riskSignal:
          type: object
    CsvOneTimeSearchRequest:
      type: object
      required: [jobProfile, sourceType, csvFilePath]
      properties:
        jobProfile:
          $ref: "#/components/schemas/JobProfile"
        sourceType:
          type: string
          enum: [csv]
        targetResultCount:
          type: integer
          minimum: 10
          maximum: 500
          default: 200
        csvFilePath:
          type: string
    PluginOneTimeSearchRequest:
      type: object
      required: [jobProfile, sourceType]
      properties:
        jobProfile:
          $ref: "#/components/schemas/JobProfile"
        sourceType:
          type: string
          enum: [plugin]
        targetResultCount:
          type: integer
          minimum: 10
          maximum: 500
          default: 200
    QueuedSearchRunResponse:
      type: object
      required: [jobId, searchRunId, status, statusUrl]
      properties:
        jobId:
          type: string
        searchRunId:
          type: string
        status:
          type: string
          example: Queued
        statusUrl:
          type: string
    PluginSearchRunResponse:
      type: object
      required: [searchRunId, status, statusUrl]
      properties:
        searchRunId:
          type: string
        status:
          $ref: "#/components/schemas/SearchRunStatus"
        statusUrl:
          type: string
    PluginCandidateSubmission:
      type: object
      required: [batchId, candidates]
      properties:
        batchId:
          type: string
        sourcePlatform:
          type: string
        candidates:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CandidateDraft"
    RawPluginSubmission:
      type: object
      required: [batchId, sourcePlatform, payloads]
      properties:
        batchId:
          type: string
          description: 同 SearchRun 内幂等键。建议加 raw- 前缀，避免与 /candidates 的 batchId 命名空间碰撞。
        sourcePlatform:
          type: string
          enum: [Boss]
          description: 必须是服务端映射注册表已知平台，否则 ValidationError。
        captureVersion:
          type: string
          description: 插件版本，用于把解析异常关联到具体插件版本。
        payloads:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/RawCapturePayload"
    RawCapturePayload:
      type: object
      required: [url, matched, json]
      properties:
        url:
          type: string
          description: 该响应的来源接口地址。
        matched:
          type: string
          enum: [exact, heuristic]
          description: exact 为命中插件已知接口白名单；heuristic 为启发式规则捕获。服务端据此统计，用于发现来源平台新上线接口。
        capturedAt:
          type: string
          format: date-time
        json:
          description: >-
            原始响应体，服务端不校验其结构——校验结构等于把字段名再次写死进契约。
            结构安全由深度/条数/键数/字符串长度上限保证。
    RawParseSummary:
      type: object
      required: [mappingVersion, geeksExtracted, draftsParsed, rejected, rejectedReasons]
      properties:
        mappingVersion:
          type: string
          description: 服务端当前映射版本，插件应展示给用户，便于解析异常时无需发版即可定位。
        geeksExtracted:
          type: integer
        draftsParsed:
          type: integer
        rejected:
          type: integer
        rejectedReasons:
          type: object
          additionalProperties:
            type: integer
          description: 各拒绝原因计数，如 missingTitle / missingCity / notAGeek。
    RawParseDiagnostic:
      type: object
      required: [batchId, sourcePlatform, mappingVersion, geeksExtracted, draftsParsed, rejectedCount, keyCensus, createdAt]
      properties:
        batchId:
          type: string
        sourcePlatform:
          type: string
        mappingVersion:
          type: string
        captureVersion:
          type: string
        geeksExtracted:
          type: integer
        draftsParsed:
          type: integer
        rejectedCount:
          type: integer
        rejectReasonCounts:
          type: object
          additionalProperties:
            type: integer
        keyCensus:
          type: object
          additionalProperties:
            type: integer
          description: 原始响应中各字段名的出现次数。仅字段名，不含字段值。
        createdAt:
          type: string
          format: date-time
    ResumeAttachmentUpload:
      type: object
      required: [filename, contentType, contentBase64]
      properties:
        filename:
          type: string
        contentType:
          type: string
          enum:
            - application/pdf
            - application/msword
            - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        contentBase64:
          type: string
    SearchRunStatus:
      type: string
      enum: [Created, Running, Acquired, Deduplicated, HardFiltered, Assessed, Completed, Interrupted, Failed, Cancelled]
    SearchRun:
      type: object
      required: [id, jobProfileId, jobProfileVersionId, status, targetResultCount, rawSubmittedCount, candidates, events]
      properties:
        id:
          type: string
        jobProfileId:
          type: string
        jobProfileVersionId:
          type: string
        ownerId:
          type: string
        status:
          $ref: "#/components/schemas/SearchRunStatus"
        targetResultCount:
          type: integer
        rawSubmittedCount:
          type: integer
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateResult"
        events:
          type: array
          items:
            type: object
        failureReason:
          type: string
        interruptedReason:
          type: string
    MatchAssessment:
      type: object
      required: [score, recommendation, recommendationReason, matchedPoints, unmatchedPoints, riskPoints, trace, assessedAt, promptVersion, agentVersion]
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        recommendation:
          type: string
          enum: [推荐, 待定, 不推荐]
        recommendationReason:
          type: string
        matchedPoints:
          type: array
          maxItems: 3
          items:
            type: string
        unmatchedPoints:
          type: array
          maxItems: 3
          items:
            type: string
        riskPoints:
          type: array
          maxItems: 3
          items:
            type: string
        trace:
          type: string
        assessedAt:
          type: string
          format: date-time
        jobProfileVersionId:
          type: string
        promptVersion:
          type: string
        agentVersion:
          type: string
    PublicResumeAttachment:
      type: object
      description: 公开附件元数据，不包含本地 storagePath。
      required: [filename, contentType, sizeBytes, uploadedAt]
      properties:
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
        uploadedAt:
          type: string
          format: date-time
    HardConditionDimension:
      type: object
      required: [id, key, label, valueType, supportedMatchModes, allowMultiple, createdAt, options]
      properties:
        id:
          type: string
        key:
          type: string
        label:
          type: string
        valueType:
          type: string
        supportedMatchModes:
          type: array
          items:
            type: string
        allowMultiple:
          type: boolean
        createdAt:
          type: string
          format: date-time
        options:
          type: array
          items:
            type: object
    AIAssessmentAudit:
      type: object
      required: [id, searchRunId, jobProfileId, agentType, provider, model, promptVersion, agentVersion, prompt, candidateIds, inputSnapshot, outputSnapshot, durationMs, status, createdAt]
      properties:
        id:
          type: string
        searchRunId:
          type: string
        jobProfileId:
          type: string
        jobProfileVersionId:
          type: string
        agentType:
          type: string
          enum: [job-profile, soft-condition, match-assessment]
        provider:
          type: string
        model:
          type: string
        promptVersion:
          type: string
        agentVersion:
          type: string
        graphVersion:
          type: string
        prompt:
          type: string
        candidateIds:
          type: array
          items:
            type: string
        inputSnapshot:
          type: object
        outputSnapshot:
          type: array
          items:
            type: object
        durationMs:
          type: integer
        status:
          type: string
          enum: [success, failure]
        errorType:
          type: string
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
