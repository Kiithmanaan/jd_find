# 文档性质：现状事实源（API 契约）——请求校验以 src/api/schemas.ts 为代码事实源，本文件为对外发布契约，受 npm run contracts:check 校验。
openapi: 3.0.3
info:
  title: JD Search API
  version: 0.1.0
  description: 第一阶段 API 规格，覆盖认证、硬性条件配置、SearchRun、插件候选人提交和 AI 审计。
servers:
  - url: http://127.0.0.1:3000/api
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: 健康检查
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /auth/login:
    post:
      summary: Web 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /plugin/auth/login:
    post:
      summary: 插件登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /hard-condition-config:
    get:
      summary: 获取硬性条件配置
      security: []
      responses:
        "200":
          description: 硬性条件维度和选项
          content:
            application/json:
              schema:
                type: object
                required: [dimensions]
                properties:
                  dimensions:
                    type: array
                    items:
                      $ref: "#/components/schemas/HardConditionDimension"
  /search-runs/one-time:
    post:
      summary: 启动一次性寻访
      description: Mock/CSV 来源入队；插件来源创建 Running 状态 SearchRun。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/MockOneTimeSearchRequest"
                - $ref: "#/components/schemas/CsvOneTimeSearchRequest"
                - $ref: "#/components/schemas/PluginOneTimeSearchRequest"
      responses:
        "202":
          description: 已接受
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/QueuedSearchRunResponse"
                  - $ref: "#/components/schemas/PluginSearchRunResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "422":
          $ref: "#/components/responses/DomainError"
  /search-runs/{id}:
    get:
      summary: 查询 SearchRun
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: SearchRun
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchRun"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /search-runs/{id}/cancel:
    post:
      summary: 取消 SearchRun
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: 已取消
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchRun"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          $ref: "#/components/responses/DomainError"
  /search-runs/{id}/candidates/{candidateId}/resume-attachment:
    get:
      summary: 下载候选人简历附件
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
        - $ref: "#/components/parameters/CandidateId"
      responses:
        "200":
          description: 简历附件二进制内容
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: SearchRun、候选人或附件不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search-runs/{id}/ai-assessment-audits:
    get:
      summary: 查询 SearchRun 的 AI 审计
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: AI 审计记录
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, records]
                properties:
                  searchRunId:
                    type: string
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIAssessmentAudit"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /search-runs/{id}/refinement-suggestions:
    post:
      summary: 触发搜索词迭代分析（推荐组 vs 淘汰组），产出下一轮搜索条件建议
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "201":
          description: 生成的搜索条件建议
          content:
            application/json:
              schema:
                type: object
                required: [suggestion]
                properties:
                  suggestion:
                    $ref: "#/components/schemas/SearchRefinementSuggestion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          description: 同一 SearchRun 的分析正在运行
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: SearchRun 未完成或无已评估候选人（RefinementNotReady）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: 查询 SearchRun 的搜索条件建议历史（按创建时间降序）
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: 建议列表
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, suggestions]
                properties:
                  searchRunId:
                    type: string
                  suggestions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SearchRefinementSuggestion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /search-runs/{id}/report:
    get:
      summary: 查询单次 SearchRun 的寻访报告（当轮快照口径，重评估不回写）
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: 寻访报告：漏斗数字、Top 候选人、待定清单
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, jobProfileId, jobProfileVersionId, status, funnel, topCandidates, pendingCandidates]
                properties:
                  searchRunId:
                    type: string
                  jobProfileId:
                    type: string
                  jobProfileVersionId:
                    type: string
                  status:
                    type: string
                  funnel:
                    $ref: "#/components/schemas/FunnelCounts"
                  topCandidates:
                    type: array
                    description: 推荐候选人按匹配分降序前 5，不足时补高分待定候选人。
                    items:
                      $ref: "#/components/schemas/CandidateResult"
                  pendingCandidates:
                    type: array
                    description: 全部推荐结论为待定的候选人，按匹配分降序。
                    items:
                      $ref: "#/components/schemas/CandidateResult"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /job-profiles/{id}/report:
    get:
      summary: 查询 JobProfile 级汇总报告（跨 SearchRun 累计漏斗 + 去重后最新评估分布）
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 汇总报告。累计漏斗为各 run 当轮快照相加；推荐结论分布为跨 run 按 fingerprint 去重后叠加最新评估（含重评估覆盖），两者口径不同。
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, currentVersionId, totalSearchRuns, cumulativeFunnel, uniqueCandidateCount, currentRecommendationDistribution, runs]
                properties:
                  jobProfileId:
                    type: string
                  currentVersionId:
                    type: string
                  totalSearchRuns:
                    type: integer
                  cumulativeFunnel:
                    $ref: "#/components/schemas/FunnelCounts"
                  uniqueCandidateCount:
                    type: integer
                  currentRecommendationDistribution:
                    type: object
                    required: [recommended, pending, notRecommended, unassessed]
                    properties:
                      recommended:
                        type: integer
                      pending:
                        type: integer
                      notRecommended:
                        type: integer
                      unassessed:
                        type: integer
                  runs:
                    type: array
                    items:
                      type: object
                      required: [searchRunId, status, createdAt, funnel]
                      properties:
                        searchRunId:
                          type: string
                        status:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        funnel:
                          $ref: "#/components/schemas/FunnelCounts"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
        "422":
          $ref: "#/components/responses/DomainError"
  /job-profiles/{id}/clarification-interviews:
    post:
      summary: 发起澄清访谈（逼问式画像梳理），返回会话与第一个问题
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "201":
          description: 已创建的访谈会话（含 currentQuestion）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClarificationInterviewSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
    get:
      summary: 列出画像下的澄清访谈会话（按创建时间降序）
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 会话列表
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, sessions]
                properties:
                  jobProfileId:
                    type: string
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClarificationInterviewSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
  /clarification-interviews/{id}:
    get:
      summary: 查询澄清访谈会话
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 会话详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClarificationInterviewSession"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: 会话不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /clarification-interviews/{id}/answers:
    post:
      summary: 回答当前访谈问题；还有话题则返回下一问，否则完成并产出画像草稿
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answer]
              properties:
                answer:
                  type: string
      responses:
        "200":
          description: 更新后的会话（进行中含 currentQuestion，完成后含 draftOutput）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClarificationInterviewSession"
        "400":
          description: 请求校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: 会话不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/DomainError"
  /job-profiles/{id}/versions:
    get:
      summary: 查询 JobProfile 版本历史
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 版本历史
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, versions]
                properties:
                  jobProfileId:
                    type: string
                  currentVersionId:
                    type: string
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobProfileVersion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
  /job-profiles/{id}/versions/draft:
    post:
      summary: 创建 JobProfile 草稿版本
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobProfileVersionDraftRequest"
      responses:
        "201":
          description: 草稿版本
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobProfileVersion"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
  /job-profiles/{id}/versions/{versionId}/confirm:
    post:
      summary: 确认 JobProfile 版本
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 已确认
          content:
            application/json:
              schema:
                type: object
                required: [jobProfile, version]
                properties:
                  jobProfile:
                    $ref: "#/components/schemas/JobProfile"
                  version:
                    $ref: "#/components/schemas/JobProfileVersion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: JobProfile 或 JobProfileVersion 不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /job-profiles/{id}/candidates:
    get:
      summary: 查询同一 JobProfile 跨 SearchRun 去重后的候选人汇总
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 候选人汇总
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, jobProfileVersionId, currentVersionCandidates, staleVersionCandidates]
                properties:
                  jobProfileId:
                    type: string
                  jobProfileVersionId:
                    type: string
                  currentVersionCandidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/CandidateResult"
                  staleVersionCandidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/CandidateResult"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
        "422":
          $ref: "#/components/responses/DomainError"
  /job-profiles/{id}/reassess-candidates:
    post:
      summary: 手动批量重新评估同一 JobProfile 的历史候选人
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "202":
          description: 已触发并完成重新评估
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, jobProfileVersionId, reassessedCount, hardRejectedCount, affectedSearchRunIds]
                properties:
                  jobProfileId:
                    type: string
                  jobProfileVersionId:
                    type: string
                  reassessedCount:
                    type: integer
                  hardRejectedCount:
                    type: integer
                  affectedSearchRunIds:
                    type: array
                    items:
                      type: string
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
        "422":
          $ref: "#/components/responses/DomainError"
  /plugin/search-runs/{id}/candidates:
    post:
      summary: 插件提交候选人
      description: 快速返回已接收；后台按 30 秒窗口聚合，单 SearchRun 缓冲满 20 条立即触发评估。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginCandidateSubmission"
      responses:
        "202":
          description: 已接受
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, status, rawSubmittedCount, acceptedCount, candidateCount]
                properties:
                  searchRunId:
                    type: string
                  status:
                    $ref: "#/components/schemas/SearchRunStatus"
                  rawSubmittedCount:
                    type: integer
                  acceptedCount:
                    type: integer
                  candidateCount:
                    type: integer
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          description: SearchRun 已完成、取消或失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /plugin/search-runs/{id}/candidates/{candidateId}/resume-attachment:
    post:
      summary: 插件上传候选人简历附件
      description: 第一阶段使用 JSON base64 传输；本地存储按 SearchRun 分目录；重复上传覆盖候选人当前附件。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeAttachmentUpload"
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, candidateId, filename, contentType, sizeBytes, downloadUrl]
                properties:
                  searchRunId:
                    type: string
                  candidateId:
                    type: string
                  filename:
                    type: string
                  contentType:
                    type: string
                  sizeBytes:
                    type: integer
                  downloadUrl:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: SearchRun 或 Candidate 不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          $ref: "#/components/responses/DomainError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SearchRunId:
      name: id
      in: path
      required: true
      schema:
        type: string
    JobProfileId:
      name: id
      in: path
      required: true
      schema:
        type: string
    CandidateId:
      name: candidateId
      in: path
      required: true
      schema:
        type: string
  responses:
    ValidationError:
      description: 请求校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AuthError:
      description: 认证失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DomainError:
      description: 领域规则错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SearchRunNotFound:
      description: SearchRun 不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    JobProfileNotFound:
      description: JobProfile 不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [token, tokenType, expiresIn]
      properties:
        token:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        issues:
          type: array
          items:
            type: object
            required: [path, message]
            properties:
              path:
                type: string
              message:
                type: string
    SearchRefinementSuggestion:
      type: object
      description: 搜索词迭代分析产出的搜索条件建议，绑定生成时的画像版本。
      required: [id, searchRunId, jobProfileId, jobProfileVersionId, suggestedSearchCondition, addedKeywords, droppedKeywords, reasoning, analysisSnapshot, provider, model, promptVersion, agentVersion, createdAt]
      properties:
        id:
          type: string
        searchRunId:
          type: string
        jobProfileId:
          type: string
        jobProfileVersionId:
          type: string
        suggestedSearchCondition:
          type: object
        addedKeywords:
          type: array
          items:
            type: string
        droppedKeywords:
          type: array
          items:
            type: string
        reasoning:
          type: string
        analysisSnapshot:
          type: object
          required: [recommendedCount, eliminatedCount, recommendedTraits, eliminatedTraits]
          properties:
            recommendedCount:
              type: integer
            eliminatedCount:
              type: integer
            recommendedTraits:
              type: array
              items:
                type: string
            eliminatedTraits:
              type: array
              items:
                type: string
        provider:
          type: string
        model:
          type: string
        promptVersion:
          type: string
        agentVersion:
          type: string
        createdAt:
          type: string
          format: date-time
    ClarificationInterviewSession:
      type: object
      description: 澄清访谈会话。turns 内嵌每轮 AI 调用元数据即审计；进行中含 currentQuestion，完成后含 draftOutput。
      required: [id, jobProfileId, status, currentTopicIndex, turns, provider, model, promptVersion, createdAt, updatedAt]
      properties:
        id:
          type: string
        jobProfileId:
          type: string
        createdByUserId:
          type: string
        status:
          type: string
          enum: [InProgress, Completed, Abandoned]
        currentTopicIndex:
          type: integer
        turns:
          type: array
          items:
            type: object
            required: [topicKey, question, suggestedAnswer, askedAt, ai]
            properties:
              topicKey:
                type: string
                enum: [role-purpose, hard-gates, vital-skills, negative-signals, target-companies, search-keywords, soft-preferences]
              question:
                type: string
              suggestedAnswer:
                type: string
              answer:
                type: string
              askedAt:
                type: string
                format: date-time
              answeredAt:
                type: string
                format: date-time
              ai:
                type: object
                required: [provider, model, promptVersion, agentVersion, durationMs]
                properties:
                  provider:
                    type: string
                  model:
                    type: string
                  promptVersion:
                    type: string
                  agentVersion:
                    type: string
                  graphVersion:
                    type: string
                  durationMs:
                    type: integer
        currentQuestion:
          type: object
          required: [topicKey, question, suggestedAnswer]
          properties:
            topicKey:
              type: string
            question:
              type: string
            suggestedAnswer:
              type: string
        draftOutput:
          type: object
          required: [jdText, hardRequirementNotes, softRequirements, negativeSignals, searchKeywords]
          properties:
            jdText:
              type: string
            hardRequirementNotes:
              type: array
              items:
                type: string
            softRequirements:
              type: array
              items:
                type: object
            negativeSignals:
              type: array
              items:
                type: string
            searchKeywords:
              type: array
              items:
                type: string
        provider:
          type: string
        model:
          type: string
        promptVersion:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
    FunnelCounts:
      type: object
