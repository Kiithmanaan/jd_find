openapi: 3.0.3
info:
  title: JD Search API
  version: 0.1.0
  description: 第一阶段 API 规格，覆盖认证、硬性条件配置、SearchRun、插件候选人提交和 AI 审计。
servers:
  - url: http://127.0.0.1:3000/api
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: 健康检查
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /auth/login:
    post:
      summary: Web 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /plugin/auth/login:
    post:
      summary: 插件登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /hard-condition-config:
    get:
      summary: 获取硬性条件配置
      security: []
      responses:
        "200":
          description: 硬性条件维度和选项
          content:
            application/json:
              schema:
                type: object
                required: [dimensions]
                properties:
                  dimensions:
                    type: array
                    items:
                      $ref: "#/components/schemas/HardConditionDimension"
  /search-runs/one-time:
    post:
      summary: 启动一次性寻访
      description: Mock/CSV 来源入队；插件来源创建 Running 状态 SearchRun。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/MockOneTimeSearchRequest"
                - $ref: "#/components/schemas/CsvOneTimeSearchRequest"
                - $ref: "#/components/schemas/PluginOneTimeSearchRequest"
      responses:
        "202":
          description: 已接受
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/QueuedSearchRunResponse"
                  - $ref: "#/components/schemas/PluginSearchRunResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "422":
          $ref: "#/components/responses/DomainError"
  /search-runs/{id}:
    get:
      summary: 查询 SearchRun
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: SearchRun
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchRun"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /search-runs/{id}/ai-assessment-audits:
    get:
      summary: 查询 SearchRun 的 AI 审计
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: AI 审计记录
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, records]
                properties:
                  searchRunId:
                    type: string
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIAssessmentAudit"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /plugin/search-runs/{id}/candidates:
    post:
      summary: 插件提交候选人
      description: 第一阶段基础实现可同步处理；目标状态为快速返回已接收并后台聚合。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginCandidateSubmission"
      responses:
        "202":
          description: 已接受
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, status, rawSubmittedCount, acceptedCount, candidateCount]
                properties:
                  searchRunId:
                    type: string
                  status:
                    $ref: "#/components/schemas/SearchRunStatus"
                  rawSubmittedCount:
                    type: integer
                  acceptedCount:
                    type: integer
                  candidateCount:
                    type: integer
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          description: SearchRun 已完成、取消或失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SearchRunId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    ValidationError:
      description: 请求校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AuthError:
      description: 认证失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DomainError:
      description: 领域规则错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SearchRunNotFound:
      description: SearchRun 不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [token, tokenType, expiresIn]
      properties:
        token:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        issues:
          type: array
          items:
            type: object
            required: [path, message]
            properties:
              path:
                type: string
              message:
                type: string
    JobProfile:
      type: object
      required: [id, title, jdText, status, searchCondition, hardRequirements, softRequirements]
      properties:
        id:
          type: string
        createdByUserId:
          type: string
        title:
          type: string
        jdText:
          type: string
        status:
          type: string
          enum: [Draft, Suggested, Confirmed, Archived]
        currentVersionId:
          type: string
        searchCondition:
          type: object
        hardRequirements:
          type: array
          items:
            type: object
        softRequirements:
          type: array
          items:
            type: object
        confirmedAt:
          type: string
          format: date-time
    CandidateDraft:
      type: object
      required: [fingerprint, resume, intent, activityLevel, sourceLead]
      properties:
        fingerprint:
          type: string
        resume:
          $ref: "#/components/schemas/CandidateResume"
        intent:
          type: string
        activityLevel:
          type: string
        sourceLead:
          $ref: "#/components/schemas/SourceLead"
    CandidateResume:
      type: object
      required: [name, title, city, educationLevel, yearsOfExperience, industries, keywords, summary]
      properties:
        name:
          type: string
        title:
          type: string
        city:
          type: string
        educationLevel:
          type: string
        yearsOfExperience:
          type: integer
        industries:
          type: array
          items:
            type: string
        keywords:
          type: array
          items:
            type: string
        summary:
          type: string
    SourceLead:
      type: object
      required: [platform, searchContext, fallbackClues]
      properties:
        platform:
          type: string
        url:
          type: string
          format: uri
        searchContext:
          type: string
        fallbackClues:
          type: array
          items:
            type: string
        expired:
          type: boolean
    MockOneTimeSearchRequest:
      type: object
      required: [jobProfile, sourceType, candidates]
      properties:
        jobProfile:
          $ref: "#/components/schemas/JobProfile"
        sourceType:
          type: string
          enum: [mock]
        targetResultCount:
          type: integer
          minimum: 10
          maximum: 500
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateDraft"
        riskSignal:
          type: object
    CsvOneTimeSearchRequest:
      type: object
      required: [jobProfile, sourceType, csvFilePath]
      properties:
        jobProfile:
          $ref: "#/components/schemas/JobProfile"
        sourceType:
          type: string
          enum: [csv]
        targetResultCount:
          type: integer
          minimum: 10
          maximum: 500
        csvFilePath:
          type: string
    PluginOneTimeSearchRequest:
      type: object
      required: [jobProfile, sourceType, targetResultCount]
      properties:
        jobProfile:
          $ref: "#/components/schemas/JobProfile"
        sourceType:
          type: string
          enum: [plugin]
        targetResultCount:
          type: integer
          minimum: 10
          maximum: 500
    QueuedSearchRunResponse:
      type: object
      required: [jobId, searchRunId, status, statusUrl]
      properties:
        jobId:
          type: string
        searchRunId:
          type: string
        status:
          type: string
          example: Queued
        statusUrl:
          type: string
    PluginSearchRunResponse:
      type: object
      required: [searchRunId, status, statusUrl]
      properties:
        searchRunId:
          type: string
        status:
          $ref: "#/components/schemas/SearchRunStatus"
        statusUrl:
          type: string
    PluginCandidateSubmission:
      type: object
      required: [candidates]
      properties:
        batchId:
          type: string
        sourcePlatform:
          type: string
        candidates:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CandidateDraft"
    SearchRunStatus:
      type: string
      enum: [Created, Running, Acquired, Deduplicated, HardFiltered, Assessed, Completed, Interrupted, Failed, Cancelled]
    SearchRun:
      type: object
      required: [id, jobProfileId, jobProfileVersionId, status, targetResultCount, rawSubmittedCount, candidates, events]
      properties:
        id:
          type: string
        jobProfileId:
          type: string
        jobProfileVersionId:
          type: string
        ownerId:
          type: string
        status:
          $ref: "#/components/schemas/SearchRunStatus"
        targetResultCount:
          type: integer
        rawSubmittedCount:
          type: integer
        candidates:
          type: array
          items:
            type: object
        events:
          type: array
          items:
            type: object
        failureReason:
          type: string
        interruptedReason:
          type: string
    HardConditionDimension:
      type: object
      required: [id, key, label, valueType, supportedMatchModes, allowMultiple, createdAt, options]
      properties:
        id:
          type: string
        key:
          type: string
        label:
          type: string
        valueType:
          type: string
        supportedMatchModes:
          type: array
          items:
            type: string
        allowMultiple:
          type: boolean
        createdAt:
          type: string
          format: date-time
        options:
          type: array
          items:
            type: object
    AIAssessmentAudit:
      type: object
      required: [id, searchRunId, jobProfileId, provider, model, candidateIds, inputSnapshot, outputSnapshot, createdAt]
      properties:
        id:
          type: string
        searchRunId:
          type: string
        jobProfileId:
          type: string
        jobProfileVersionId:
          type: string
        provider:
          type: string
        model:
          type: string
        candidateIds:
          type: array
          items:
            type: string
        inputSnapshot:
          type: object
        outputSnapshot:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time
