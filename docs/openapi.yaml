openapi: 3.0.3
info:
  title: JD Search API
  version: 0.1.0
  description: 第一阶段 API 规格，覆盖认证、硬性条件配置、SearchRun、插件候选人提交和 AI 审计。
servers:
  - url: http://127.0.0.1:3000/api
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: 健康检查
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /auth/login:
    post:
      summary: Web 登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /plugin/auth/login:
    post:
      summary: 插件登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /hard-condition-config:
    get:
      summary: 获取硬性条件配置
      security: []
      responses:
        "200":
          description: 硬性条件维度和选项
          content:
            application/json:
              schema:
                type: object
                required: [dimensions]
                properties:
                  dimensions:
                    type: array
                    items:
                      $ref: "#/components/schemas/HardConditionDimension"
  /search-runs/one-time:
    post:
      summary: 启动一次性寻访
      description: Mock/CSV 来源入队；插件来源创建 Running 状态 SearchRun。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/MockOneTimeSearchRequest"
                - $ref: "#/components/schemas/CsvOneTimeSearchRequest"
                - $ref: "#/components/schemas/PluginOneTimeSearchRequest"
      responses:
        "202":
          description: 已接受
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/QueuedSearchRunResponse"
                  - $ref: "#/components/schemas/PluginSearchRunResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "422":
          $ref: "#/components/responses/DomainError"
  /search-runs/{id}:
    get:
      summary: 查询 SearchRun
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: SearchRun
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchRun"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /search-runs/{id}/cancel:
    post:
      summary: 取消 SearchRun
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: 已取消
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchRun"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          $ref: "#/components/responses/DomainError"
  /search-runs/{id}/candidates/{candidateId}/resume-attachment:
    get:
      summary: 下载候选人简历附件
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
        - $ref: "#/components/parameters/CandidateId"
      responses:
        "200":
          description: 简历附件二进制内容
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: SearchRun、候选人或附件不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /search-runs/{id}/ai-assessment-audits:
    get:
      summary: 查询 SearchRun 的 AI 审计
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      responses:
        "200":
          description: AI 审计记录
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, records]
                properties:
                  searchRunId:
                    type: string
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIAssessmentAudit"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
  /job-profiles/{id}/versions:
    get:
      summary: 查询 JobProfile 版本历史
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 版本历史
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, versions]
                properties:
                  jobProfileId:
                    type: string
                  currentVersionId:
                    type: string
                  versions:
                    type: array
                    items:
                      $ref: "#/components/schemas/JobProfileVersion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
  /job-profiles/{id}/versions/draft:
    post:
      summary: 创建 JobProfile 草稿版本
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobProfileVersionDraftRequest"
      responses:
        "201":
          description: 草稿版本
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobProfileVersion"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
  /job-profiles/{id}/versions/{versionId}/confirm:
    post:
      summary: 确认 JobProfile 版本
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 已确认
          content:
            application/json:
              schema:
                type: object
                required: [jobProfile, version]
                properties:
                  jobProfile:
                    $ref: "#/components/schemas/JobProfile"
                  version:
                    $ref: "#/components/schemas/JobProfileVersion"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: JobProfile 或 JobProfileVersion 不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /job-profiles/{id}/candidates:
    get:
      summary: 查询同一 JobProfile 跨 SearchRun 去重后的候选人汇总
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "200":
          description: 候选人汇总
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, jobProfileVersionId, currentVersionCandidates, staleVersionCandidates]
                properties:
                  jobProfileId:
                    type: string
                  jobProfileVersionId:
                    type: string
                  currentVersionCandidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/CandidateResult"
                  staleVersionCandidates:
                    type: array
                    items:
                      $ref: "#/components/schemas/CandidateResult"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
        "422":
          $ref: "#/components/responses/DomainError"
  /job-profiles/{id}/reassess-candidates:
    post:
      summary: 手动批量重新评估同一 JobProfile 的历史候选人
      parameters:
        - $ref: "#/components/parameters/JobProfileId"
      responses:
        "202":
          description: 已触发并完成重新评估
          content:
            application/json:
              schema:
                type: object
                required: [jobProfileId, jobProfileVersionId, reassessedCount, hardRejectedCount, affectedSearchRunIds]
                properties:
                  jobProfileId:
                    type: string
                  jobProfileVersionId:
                    type: string
                  reassessedCount:
                    type: integer
                  hardRejectedCount:
                    type: integer
                  affectedSearchRunIds:
                    type: array
                    items:
                      type: string
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/JobProfileNotFound"
        "422":
          $ref: "#/components/responses/DomainError"
  /plugin/search-runs/{id}/candidates:
    post:
      summary: 插件提交候选人
      description: 快速返回已接收；后台按 30 秒窗口聚合，单 SearchRun 缓冲满 20 条立即触发评估。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginCandidateSubmission"
      responses:
        "202":
          description: 已接受
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, status, rawSubmittedCount, acceptedCount, candidateCount]
                properties:
                  searchRunId:
                    type: string
                  status:
                    $ref: "#/components/schemas/SearchRunStatus"
                  rawSubmittedCount:
                    type: integer
                  acceptedCount:
                    type: integer
                  candidateCount:
                    type: integer
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          $ref: "#/components/responses/SearchRunNotFound"
        "409":
          description: SearchRun 已完成、取消或失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /plugin/search-runs/{id}/candidates/{candidateId}/resume-attachment:
    post:
      summary: 插件上传候选人简历附件
      description: 第一阶段使用 JSON base64 传输；本地存储按 SearchRun 分目录；重复上传覆盖候选人当前附件。
      parameters:
        - $ref: "#/components/parameters/SearchRunId"
        - $ref: "#/components/parameters/CandidateId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResumeAttachmentUpload"
      responses:
        "200":
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                required: [searchRunId, candidateId, filename, contentType, sizeBytes, downloadUrl]
                properties:
                  searchRunId:
                    type: string
                  candidateId:
                    type: string
                  filename:
                    type: string
                  contentType:
                    type: string
                  sizeBytes:
                    type: integer
                  downloadUrl:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/AuthError"
        "403":
          $ref: "#/components/responses/AuthError"
        "404":
          description: SearchRun 或 Candidate 不存在
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          $ref: "#/components/responses/DomainError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    SearchRunId:
      name: id
      in: path
      required: true
      schema:
        type: string
    JobProfileId:
      name: id
      in: path
      required: true
      schema:
        type: string
    CandidateId:
      name: candidateId
      in: path
      required: true
      schema:
        type: string
  responses:
    ValidationError:
      description: 请求校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AuthError:
      description: 认证失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DomainError:
      description: 领域规则错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SearchRunNotFound:
      description: SearchRun 不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    JobProfileNotFound:
      description: JobProfile 不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [token, tokenType, expiresIn]
      properties:
        token:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        issues:
          type: array
          items:
            type: object
            required: [path, message]
            properties:
              path:
                type: string
              message:
                type: string
    JobProfile:
      type: object
      required: [id, title, jdText, status, searchCondition, hardRequirements, softRequirements]
      properties:
        id:
          type: string
        createdByUserId:
          type: string
        title:
          type: string
        jdText:
          type: string
        status:
          type: string
          enum: [Draft, Suggested, Confirmed, Archived]
        currentVersionId:
          type: string
        searchCondition:
          type: object
        hardRequirements:
          type: array
          items:
            type: object
        softRequirements:
          type: array
          items:
            type: object
        confirmedAt:
          type: string
          format: date-time
    JobProfileVersion:
      type: object
      required: [id, jobProfileId, version, title, jdText, searchCondition, hardRequirements, softRequirements, status, createdAt]
      properties:
        id:
          type: string
        jobProfileId:
          type: string
        version:
          type: integer
        title:
          type: string
        jdText:
          type: string
        searchCondition:
          type: object
        hardRequirements:
          type: array
          items:
            type: object
        softRequirements:
          type: array
          items:
            type: object
        status:
          type: string
          enum: [Draft, Confirmed]
        createdAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
    JobProfileVersionDraftRequest:
      type: object
      required: [title, jdText, searchCondition, hardRequirements, softRequirements]
      properties:
        title:
          type: string
        jdText:
          type: string
        searchCondition:
          type: object
        hardRequirements:
          type: array
          items:
            type: object
        softRequirements:
          type: array
          items:
            type: object
    CandidateDraft:
      type: object
      required: [fingerprint, resume, intent, activityLevel, sourceLead]
      properties:
        fingerprint:
          type: string
        resume:
          $ref: "#/components/schemas/CandidateResume"
        intent:
          type: string
        activityLevel:
          type: string
        sourceLead:
          $ref: "#/components/schemas/SourceLead"
    CandidateResult:
      type: object
      required: [id, fingerprint, jobProfileId, searchRunId, status, resume, intent, activityLevel, sourceLead, hardRejectReasons]
      properties:
        id:
          type: string
        fingerprint:
          type: string
        jobProfileId:
          type: string
        searchRunId:
          type: string
        status:
          type: string
          enum: [Pending, Acquired, Deduplicated, HardPassed, HardRejected, Assessed, Displayable]
        resume:
          $ref: "#/components/schemas/CandidateResume"
        intent:
          type: string
        activityLevel:
          type: string
        sourceLead:
          $ref: "#/components/schemas/SourceLead"
        hardRejectReasons:
          type: array
          items:
            type: string
        matchAssessment:
          $ref: "#/components/schemas/MatchAssessment"
        resumeAttachment:
          $ref: "#/components/schemas/PublicResumeAttachment"
    CandidateResume:
      type: object
      required: [name, title, city, educationLevel, yearsOfExperience, industries, keywords, summary]
      properties:
        name:
          type: string
        title:
          type: string
        city:
          type: string
        educationLevel:
          type: string
        yearsOfExperience:
          type: integer
        industries:
          type: array
          items:
            type: string
        keywords:
          type: array
          items:
            type: string
        summary:
          type: string
    SourceLead:
      type: object
      required: [platform, searchContext, fallbackClues]
      properties:
        platform:
          type: string
        url:
          type: string
          format: uri
        searchContext:
          type: string
        fallbackClues:
          type: array
          items:
            type: string
        expired:
          type: boolean
    MockOneTimeSearchRequest:
      type: object
      required: [jobProfile, sourceType, candidates]
      properties:
        jobProfile:
          $ref: "#/components/schemas/JobProfile"
        sourceType:
          type: string
          enum: [mock]
        targetResultCount:
          type: integer
          minimum: 10
          maximum: 500
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateDraft"
        riskSignal:
          type: object
    CsvOneTimeSearchRequest:
      type: object
      required: [jobProfile, sourceType, csvFilePath]
      properties:
        jobProfile:
          $ref: "#/components/schemas/JobProfile"
        sourceType:
          type: string
          enum: [csv]
        targetResultCount:
          type: integer
          minimum: 10
          maximum: 500
        csvFilePath:
          type: string
    PluginOneTimeSearchRequest:
      type: object
      required: [jobProfile, sourceType]
      properties:
        jobProfile:
          $ref: "#/components/schemas/JobProfile"
        sourceType:
          type: string
          enum: [plugin]
        targetResultCount:
          type: integer
          minimum: 10
          maximum: 500
          default: 200
    QueuedSearchRunResponse:
      type: object
      required: [jobId, searchRunId, status, statusUrl]
      properties:
        jobId:
          type: string
        searchRunId:
          type: string
        status:
          type: string
          example: Queued
        statusUrl:
          type: string
    PluginSearchRunResponse:
      type: object
      required: [searchRunId, status, statusUrl]
      properties:
        searchRunId:
          type: string
        status:
          $ref: "#/components/schemas/SearchRunStatus"
        statusUrl:
          type: string
    PluginCandidateSubmission:
      type: object
      required: [candidates]
      properties:
        batchId:
          type: string
        sourcePlatform:
          type: string
        candidates:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CandidateDraft"
    ResumeAttachmentUpload:
      type: object
      required: [filename, contentType, contentBase64]
      properties:
        filename:
          type: string
        contentType:
          type: string
          enum:
            - application/pdf
            - application/msword
            - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        contentBase64:
          type: string
    SearchRunStatus:
      type: string
      enum: [Created, Running, Acquired, Deduplicated, HardFiltered, Assessed, Completed, Interrupted, Failed, Cancelled]
    SearchRun:
      type: object
      required: [id, jobProfileId, jobProfileVersionId, status, targetResultCount, rawSubmittedCount, candidates, events]
      properties:
        id:
          type: string
        jobProfileId:
          type: string
        jobProfileVersionId:
          type: string
        ownerId:
          type: string
        status:
          $ref: "#/components/schemas/SearchRunStatus"
        targetResultCount:
          type: integer
        rawSubmittedCount:
          type: integer
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateResult"
        events:
          type: array
          items:
            type: object
        failureReason:
          type: string
        interruptedReason:
          type: string
    MatchAssessment:
      type: object
      required: [score, recommendation, recommendationReason, matchedPoints, unmatchedPoints, riskPoints, trace, assessedAt, promptVersion, agentVersion]
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        recommendation:
          type: string
          enum: [推荐, 待定, 不推荐]
        recommendationReason:
          type: string
        matchedPoints:
          type: array
          maxItems: 3
          items:
            type: string
        unmatchedPoints:
          type: array
          maxItems: 3
          items:
            type: string
        riskPoints:
          type: array
          maxItems: 3
          items:
            type: string
        trace:
          type: string
        assessedAt:
          type: string
          format: date-time
        jobProfileVersionId:
          type: string
        promptVersion:
          type: string
        agentVersion:
          type: string
    PublicResumeAttachment:
      type: object
      description: 公开附件元数据，不包含本地 storagePath。
      required: [filename, contentType, sizeBytes, uploadedAt]
      properties:
        filename:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
        uploadedAt:
          type: string
          format: date-time
    HardConditionDimension:
      type: object
      required: [id, key, label, valueType, supportedMatchModes, allowMultiple, createdAt, options]
      properties:
        id:
          type: string
        key:
          type: string
        label:
          type: string
        valueType:
          type: string
        supportedMatchModes:
          type: array
          items:
            type: string
        allowMultiple:
          type: boolean
        createdAt:
          type: string
          format: date-time
        options:
          type: array
          items:
            type: object
    AIAssessmentAudit:
      type: object
      required: [id, searchRunId, jobProfileId, agentType, provider, model, promptVersion, agentVersion, prompt, candidateIds, inputSnapshot, outputSnapshot, durationMs, status, createdAt]
      properties:
        id:
          type: string
        searchRunId:
          type: string
        jobProfileId:
          type: string
        jobProfileVersionId:
          type: string
        agentType:
          type: string
          enum: [job-profile, soft-condition, match-assessment]
        provider:
          type: string
        model:
          type: string
        promptVersion:
          type: string
        agentVersion:
          type: string
        graphVersion:
          type: string
        prompt:
          type: string
        candidateIds:
          type: array
          items:
            type: string
        inputSnapshot:
          type: object
        outputSnapshot:
          type: array
          items:
            type: object
        durationMs:
          type: integer
        status:
          type: string
          enum: [success, failure]
        errorType:
          type: string
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
